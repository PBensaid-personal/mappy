<head>

<style>
  :root{
    --ink:#1a1a1a; --muted:#6b7280; --line:#e8e8e8;
    --panel-bg:#ffffff; --chip-bg:#ffffff; --soft:#f4f4f5;
    --accent:#111111; --star:#f5a623; --radius:22px;
    --shadow:0 10px 40px rgba(0,0,0,.12);
    --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{font-family:var(--font);color:var(--ink);background:#e4eef3;overflow:hidden;}
  #map{position:absolute;inset:0;z-index:1;background:#e4eef3;}

  /* numbered chips as advanced markers */
  .num-chip{
    background:var(--accent);border-radius:50%;
    box-shadow:0 2px 8px rgba(0,0,0,.3);
    font-weight:700;font-size:14px;color:#fff;
    width:30px;height:30px;display:flex;align-items:center;justify-content:center;
    border:2px solid #fff;
    transition:transform .12s ease, box-shadow .12s ease;cursor:pointer;
    transform:translateY(-50%);
  }
  .num-chip:hover{transform:translateY(-50%) scale(1.14);box-shadow:0 6px 16px rgba(0,0,0,.32);z-index:9;}
  .num-chip.active{background:#fff;color:var(--accent);box-shadow:0 6px 18px rgba(0,0,0,.4);transform:translateY(-50%) scale(1.14);}
  .num-chip.home{background:#f5a623;border-color:#fff;}
  .num-chip.home.active{background:#fff;color:#f5a623;}

  /* panel */
  .panel{position:absolute;top:22px;right:22px;bottom:22px;width:430px;
    background:var(--panel-bg);border-radius:var(--radius);box-shadow:var(--shadow);
    z-index:1000;display:flex;flex-direction:column;overflow:hidden;}
  .panel-head{padding:28px 30px 18px;flex:0 0 auto;}
  .panel-head h1{margin:0;font-size:30px;line-height:1.12;font-weight:800;letter-spacing:-.4px;
    display:flex;justify-content:space-between;align-items:baseline;gap:12px;}
  .panel-head h1 span{font-weight:normal;}
  .panel-head p{margin:16px 0 0;color:#4b5563;font-size:16px;line-height:1.45;}
  .filters{display:flex;gap:8px;margin:14px 0 0;flex-wrap:wrap;}
  .filter-chip{border:1.5px solid #e2e2e2;background:#fff;border-radius:20px;
    padding:7px 14px;font-size:13.5px;font-weight:500;cursor:pointer;color:#4b5563;
    transition:background .14s,border-color .14s,color .14s;}
  .filter-chip:hover{background:var(--soft);}
  .filter-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
  .cat-tag{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;
    padding:2px 8px;border-radius:6px;background:#f3f4f6;color:#6b7280;}
  .cat-tag.food{background:#fef3c7;color:#92400e;}
  .cat-tag.fun{background:#ede9fe;color:#5b21b6;}
  .cat-tag.destination{background:#dbeafe;color:#1e40af;}
  .list{flex:1 1 auto;overflow-y:auto;padding:6px 18px 18px;-webkit-overflow-scrolling:touch;}
  .list-item{display:flex;gap:14px;align-items:center;padding:16px;border-radius:18px;
    cursor:pointer;transition:background .14s ease;margin-bottom:6px;}
  .list-item:hover,.list-item.active{background:var(--soft);}
  .li-num{flex:0 0 28px;width:28px;height:28px;border-radius:50%;background:var(--accent);
    color:#fff;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;}
  .list-item.home .li-num{background:#f5a623;}
  .thumb{width:80px;height:80px;flex:0 0 80px;border-radius:14px;background:#ededed;
    display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .thumb svg{width:30px;height:30px;opacity:.4;color:#fff;}
  .li-body{min-width:0;flex:1;}
  .li-title{display:flex;align-items:center;gap:10px;min-width:0;}
  .li-title h3{margin:0;font-size:18px;font-weight:700;letter-spacing:-.2px;min-width:0;}
  .li-meta{margin:5px 0 0;font-size:15px;color:#4b5563;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .li-meta .star{color:var(--star);}
  .li-desc{margin:6px 0 0;font-size:14.5px;color:#6b7280;line-height:1.35;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

  /* detail card */
  .detail{position:absolute;top:22px;right:22px;width:540px;max-width:calc(100vw - 44px);
    background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);z-index:1200;
    overflow:hidden;display:none;flex-direction:column;}
  .detail.show{display:flex;}
  .detail-photo{position:relative;height:300px;background:#ddd;}
  .detail-photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none;}
  .detail-photo .dots{position:absolute;left:0;right:0;bottom:14px;z-index:3;display:flex;gap:7px;justify-content:center;}
  .detail-photo .dots span{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.55);cursor:pointer;transition:background .14s, transform .14s;}
  .detail-photo .dots span:hover{transform:scale(1.25);}
  .detail-photo .dots span.on{background:#fff;}
  .gal-arrow{position:absolute;top:50%;transform:translateY(-50%);z-index:3;
    width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;
    background:rgba(0,0,0,.42);color:#fff;display:none;align-items:center;justify-content:center;
    transition:background .14s;}
  .gal-arrow:hover{background:rgba(0,0,0,.62);}
  .gal-prev{left:14px;} .gal-next{right:14px;}
  .detail-photo.multi .gal-arrow{display:flex;}
  .close-btn{position:absolute;top:16px;right:16px;z-index:3;width:36px;height:36px;border-radius:50%;
    background:rgba(255,255,255,.92);border:none;cursor:pointer;display:flex;align-items:center;
    justify-content:center;font-size:18px;color:#333;box-shadow:0 2px 8px rgba(0,0,0,.18);}
  .detail-body{padding:24px 28px 26px;overflow-y:auto;}
  .detail-title{display:flex;align-items:center;gap:12px;}
  .detail-title .li-num{flex:0 0 30px;width:30px;height:30px;font-size:15px;}
  .detail-body h2{margin:0;font-size:27px;font-weight:800;letter-spacing:-.3px;}
  .detail-sub{margin:10px 0 0;font-size:16px;color:#4b5563;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
  .detail-sub .star{color:var(--star);}
  .actions{display:flex;align-items:center;gap:12px;margin:20px 0 0;flex-wrap:wrap;}
  .actions .btn-primary{flex:1 1 auto;min-width:0;}
  .btn-primary{background:var(--accent);color:#fff;border:none;padding:13px 26px;border-radius:30px;
    font-size:16px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:8px;
    text-decoration:none;transition:opacity .14s ease;}
  .btn-primary:hover{opacity:.85;}
  .btn-round{width:50px;height:50px;border-radius:50%;border:1.5px solid #e2e2e2;background:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;text-decoration:none;
    transition:background .14s ease;}
  .btn-round:hover{background:var(--soft);}
  .btn-round svg{width:20px;height:20px;}
  .notes{margin:20px 0 0;background:var(--soft);border-radius:16px;padding:18px 20px;}
  .notes p{margin:0;font-size:17px;line-height:1.5;color:#1f2937;}
  .detail-extra{margin:16px 0 0;display:flex;flex-direction:column;gap:12px;}
  .detail-address{font-size:16px;color:#4b5563;line-height:1.45;}
  .detail-wa{display:inline-flex;align-items:center;gap:10px;font-size:16px;color:#128C7E;text-decoration:none;font-weight:500;}
  .detail-wa:hover{text-decoration:underline;}
  .detail-wa svg{flex:0 0 20px;width:20px;height:20px;}
  .contact{margin:18px 0 0;display:flex;flex-direction:column;gap:12px;}
  .contact a{display:flex;align-items:center;gap:12px;font-size:16px;color:#374151;text-decoration:none;word-break:break-all;}
  .contact svg{width:18px;height:18px;flex:0 0 18px;color:#6b7280;}
  .detail-nav{flex:0 0 auto;display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;border-top:1px solid var(--line);}
  .nav-arrow{width:44px;height:44px;border-radius:50%;border:1.5px solid #e2e2e2;background:#fff;
    cursor:pointer;display:flex;align-items:center;justify-content:center;color:#333;transition:background .14s ease;}
  .nav-arrow:hover{background:var(--soft);}
  .nav-arrow:disabled{opacity:.35;cursor:default;}
  .nav-count{font-size:17px;color:#4b5563;font-weight:500;}

  .keywarn{position:fixed;left:50%;top:22px;transform:translateX(-50%);z-index:2500;
    background:#fef3c7;color:#92400e;border:1px solid #fcd34d;border-radius:14px;
    padding:12px 20px;font-size:14.5px;max-width:90vw;text-align:center;box-shadow:0 6px 20px rgba(0,0,0,.12);display:none;}
  .keywarn.show{display:block;}
  .keywarn code{background:rgba(0,0,0,.06);padding:1px 6px;border-radius:5px;font-size:13px;}

  .sheet-handle{display:none;}
  .sheet-title-main,.sheet-title-sub,.sheet-grabber{display:none;}

  @media (max-width:760px){
    :root{--sheet-h:72vh;--sheet-handle-h:64px;}
    .panel{top:auto;left:0;right:0;bottom:0;width:100%;height:var(--sheet-h);border-radius:22px 22px 0 0;
      box-shadow:0 -8px 30px rgba(0,0,0,.18);transition:height .28s ease;}
    .panel.collapsed{height:var(--sheet-handle-h);min-height:var(--sheet-handle-h);}
    .sheet-handle{display:flex;align-items:center;justify-content:space-between;gap:14px;
      width:100%;min-height:var(--sheet-handle-h);flex:0 0 var(--sheet-handle-h);
      padding:16px 24px 10px;cursor:grab;touch-action:none;
      -webkit-user-select:none;user-select:none;}
    .sheet-title-main,.sheet-title-sub,.sheet-grabber{display:block;}
    .sheet-title-main{font-size:23px;font-weight:800;letter-spacing:-.4px;line-height:1.15;flex:1 1 0;min-width:0;}
    .sheet-title-sub{font-size:23px;font-weight:400;letter-spacing:-.4px;line-height:1.15;flex:1 1 0;min-width:0;text-align:right;}
    .sheet-grabber{width:42px;height:5px;border-radius:3px;background:#a1a1aa;flex:0 0 42px;}
    .panel.collapsed .panel-head,
    .panel.collapsed .list{display:none;}
    .panel-head{padding:2px 24px 10px;}
    .panel-head h1{display:none;}
    .panel-head .filters{margin-top:6px;}
    .panel-head p{font-size:14px;margin-top:10px;}
    .list{padding:4px 12px 24px;}
    .li-body h3{font-size:17px;}
    .detail{top:auto;left:0;right:0;bottom:0;width:100%;max-width:100%;height:var(--sheet-h);border-radius:22px 22px 0 0;
      box-shadow:0 -8px 30px rgba(0,0,0,.18);}
    .detail-body{flex:1 1 auto;min-height:0;}
    .detail-photo{height:230px;}
    .detail-body{padding:20px 20px 22px;}
    .detail-body h2{font-size:23px;}
    .btn-primary{padding:13px 22px;flex:1;justify-content:center;}
    .actions{gap:10px;}
  }

  /* ===== Landing / enter screen ===== */
  #gate{
    position:fixed;inset:0;z-index:5000;
    background:
      radial-gradient(1200px 600px at 78% 18%, rgba(70,196,180,.30), transparent 60%),
      radial-gradient(900px 700px at 15% 90%, rgba(40,90,110,.45), transparent 65%),
      linear-gradient(160deg,#16242e 0%, #15212c 45%, #101a22 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;overflow:hidden;
  }
  #gate::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:repeating-linear-gradient(115deg, rgba(255,255,255,.035) 0 1px, transparent 1px 220px);
  }
  .gate-inner{position:relative;z-index:1;max-width:760px;width:100%;
    opacity:0;transform:translateY(14px);animation:gateIn .9s ease forwards .1s;}
  @keyframes gateIn{to{opacity:1;transform:translateY(0);}}
  .gate-kicker{font-family:'Jost',sans-serif;font-weight:500;
    letter-spacing:.34em;text-transform:uppercase;font-size:15px;
    color:#5fd2c2;margin:0 0 34px;}
  .gate-title{font-family:'Cormorant Garamond',serif;color:#f4f1ea;
    line-height:.94;margin:0;font-weight:500;}
  .gate-title .l1{display:block;font-size:clamp(58px,11vw,128px);}
  .gate-title .l2{display:block;font-style:italic;font-weight:400;
    font-size:clamp(50px,9.5vw,112px);color:#aeb7bd;margin-top:2px;}
  .gate-form{margin:46px auto 0;display:flex;justify-content:center;max-width:420px;width:100%;}
  .gate-form button{
    background:#5fd2c2;color:#10222a;border:none;border-radius:40px;
    padding:16px 56px;font-family:'Jost',sans-serif;font-weight:500;
    font-size:16px;letter-spacing:.12em;text-transform:uppercase;
    cursor:pointer;transition:opacity .15s, transform .15s;}
  .gate-form button:hover{opacity:.9;transform:translateY(-1px);}
  body.locked{overflow:hidden;}
  @media (max-width:760px){
    .gate-kicker{font-size:12.5px;letter-spacing:.26em;margin-bottom:24px;}
    .gate-form button{padding:15px 44px;}
  }
</style>
</head>
<body>



<div id="map"></div>

<div class="panel" id="panel">
  <div class="sheet-handle" id="handle">
    <span class="sheet-title-main">Rome</span>
    <span class="sheet-grabber" aria-hidden="true"></span>
    <span class="sheet-title-sub">Fall 2026</span>
  </div>
  <div class="panel-head">
    <h1>Rome<span>Fall 2026</span></h1>
    <div class="filters" id="filters">
      <button class="filter-chip on" data-cat="all">All</button>
      <button class="filter-chip" data-cat="Food">Food</button>
      <button class="filter-chip" data-cat="Fun">Fun</button>
      <button class="filter-chip" data-cat="Destination">Destination</button>
    </div>
  </div>
  <div class="list" id="list"></div>
</div>

<div class="detail" id="detail">
  <div class="detail-photo" id="detailPhoto">
    <img id="detailImg" alt="">
    <button class="gal-arrow gal-prev" id="galPrev" onclick="photoStep(-1)" aria-label="Previous photo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="gal-arrow gal-next" id="galNext" onclick="photoStep(1)" aria-label="Next photo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="close-btn" onclick="closeDetail()">&times;</button>
    <div class="dots" id="detailDots"></div>
  </div>
  <div class="detail-body">
    <div class="detail-title"><span class="li-num" id="dNum"></span><h2 id="dName"></h2></div>
    <div class="detail-sub" id="dSub"></div>
    <div class="actions" id="dActions"></div>
    <div class="notes" id="dNotes" style="display:none;">
      <p id="dNotesText"></p>
    </div>
    <div class="detail-extra" id="dExtra" style="display:none;"></div>
    <div class="contact" id="dContact"></div>
  </div>
  <div class="detail-nav">
    <button class="nav-arrow" id="navPrev" onclick="nav(-1)" aria-label="Previous">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <span class="nav-count" id="navCount"></span>
    <button class="nav-arrow" id="navNext" onclick="nav(1)" aria-label="Next">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<script>
const HOME_KEY = "rome_home_base_v5";
const TEMP_ORIGIN_KEY = "rome_temp_origin";

const PLACES = [
  {name:"Elizabeth Unique Hotel", pid:"ChIJEyz2blZgLxMRLtj5Vu3Ly2A", lat:41.9072794, lng:12.4772303, type:"Hotel", home:true, address:"Via delle Colonnette 35, 00186 Roma RM, Italy", phone:"+39 06 3223633", website:"https://www.elizabethgroup.it/en/elizabeth-unique-rome/", photos:["https://cdn.blastness.biz/media/1303/unique-top/thumbs/full/1920-facciata-1.jpg","https://cdn.blastness.biz/media/1303/unique-vertical-gallery/thumbs/full/1024-vertical-hall-4.jpg","https://cdn.blastness.biz/media/1303/unique-vertical-gallery/thumbs/full/1024-vertical-library-2.jpg"], notes:"Home base. Boutique Design Hotel on Via delle Colonnette 35 — a quiet corner of the Tridente, steps from Piazza del Popolo. Perfect starting point for exploring Rome."},
  {name:"Museo della Forma Urbis", pid:"ChIJZ7c578lhLxMR3G-oln-WuLM", lat:41.8872, lng:12.4923, type:"Museum", category:"Destination", address:"Via di San Gregorio, 30, 00184 Roma", notes:"New museum mixing archaeology and cartography. Floor embossed with an 18th-century map + 3rd-century stone slabs. Free archaeological park outside. €11 admission. Last entry 6:15 PM."},
  {name:"Domus Tiberiana (Palatine Hill)", pid:"ChIJA1aK_LRhLxMRJ6Hw0arUiyI", lat:41.8896, lng:12.4875, type:"Ruin", category:"Destination", address:"Palatine Hill, Via di San Gregorio, 00184 Roma", notes:"Reopened in 2023 after decades of closure. Multimedia exhibitions in a 1st-century palace. Prime sunset views of the Forum and Colosseum. Combined ticket with Forum + Colosseum €18, valid 24 hrs."},
  {name:"Uma Roma", pid:"ChIJV59_iGxhLxMRN9TZz9JP0rY", lat:41.8606, lng:12.4720, type:"Restaurant", category:"Food", address:"Via Girolamo Benzoni, 34, 00154 Roma", phone:"+39 334 385 5945", whatsapp:"+39 334 385 5945", notes:"Scandinavian-minimalist trattoria in Garbatella. Fermentation-focused tasting menu by two Italian chefs (one formerly at Noma). 4 courses + 4 snacks €50. Book well ahead — very popular."},
  {name:"Nite Kong (Drink Kong)", pid:"ChIJf3VE-7xhLxMRnMf_uACwlXc", lat:41.8966, lng:12.4986, type:"Bar", category:"Fun", address:"Piazza di San Martino ai Monti, 8, 00184 Roma", phone:"+39 06 2348 8666", notes:"Backroom reservation-only lounge in Monti. Sultry vibe, live music. Try the Nite Negroni — redistilled to crystal clarity in their lab. €18. Reservation required."},
  {name:"Jerry Thomas Bar Room", pid:"ChIJtVi6jkRgLxMR187T1pZelGw", lat:41.8895, lng:12.4691, type:"Bar", category:"Fun", address:"Via del Moro, 10, 00153 Roma", whatsapp:"+39 340 733 2980", notes:"Second outpost of the legendary Jerry Thomas Speakeasy, in Trastevere. 6 intimate tables. Prohibition-era design. The Consulate (rum, vermouth, sherry, apricot bitters) is €15."},
  {name:"Villa Torlonia", pid:"ChIJdd6JQHJhLxMRG9JQQ8hqbL8", lat:41.9166, lng:12.5108, type:"Park & Museum", category:"Destination", address:"Via Nomentana, 70, 00161 Roma", phone:"+39 06 4426 2855", notes:"Rolling, grassy cultural complex with 19th-century buildings. Casino Nobile has frescoed ceilings and marble floors. Serra Moresca greenhouse has kaleidoscopic Moorish glass. Mussolini's WWII air-raid bunker opened to the public last year. All-access €17."},
  {name:"La Limonaia", pid:"ChIJ4SP3QXJhLxMR75HSqjU60JA", lat:41.9168, lng:12.5106, type:"Café", category:"Food", address:"Villa Torlonia, Via Nomentana, 70, 00161 Roma", notes:"Villa Torlonia café. Quick Roman-style fuel-up inside Villa Torlonia. Cappuccino €1.50, croissant €1.20. Perfect before exploring the grounds."},
  {name:"Piatto Romano", pid:"ChIJhXXscCVgLxMRa2Bc06UkXPI", lat:41.8796, lng:12.4778, type:"Restaurant", category:"Food", address:"Via Giovanni Battista Bodoni, 62, 00153 Roma", phone:"+39 06 6401 4447", whatsapp:"+39 06 6401 4447", notes:"Traditional trattoria near Testaccio market. Roman classics: carbonara, amatriciana, deep-fried artichoke, rigatoni with calf intestines, coda alla vaccinara. ~€40 for 3 courses. Book ahead."},
  {name:"Via di Monserrato", pid:"ChIJh1LyS0RgLxMRis6Arx2IXCI", lat:41.8958, lng:12.4655, type:"Shopping", category:"Fun", address:"Via di Monserrato, 00186 Roma", notes:"Cobbled shopping street lined with stone palazzos in western Centro Storico. Find: Illuminami (Gothic/Victorian wallpapers), Spazio Giallo (Italian ceramics), Le Tre Sarte (theatrical fashion). Great for an afternoon browse."},
  {name:"Santa Maria del Popolo", pid:"ChIJn8_twvhgLxMRrSlE7RYxCbg", lat:41.9107, lng:12.4763, type:"Church", category:"Destination", address:"Piazza del Popolo, 12, 00187 Roma", notes:"Medieval and Renaissance basilica. Home to two Caravaggio masterpieces in their original setting: Crucifixion of St. Peter and Conversion of St. Paul. Also: Raphael statue of Elijah, two Bernini statues. Free admission."},

const DEFAULT_HOME = { name:PLACES[0].name, lat:PLACES[0].lat, lng:PLACES[0].lng, address:PLACES[0].address, pid:PLACES[0].pid, placeIdx:0, custom:false };
const TYPE_GRADIENT = {
  "Hotel":"linear-gradient(135deg,#c9a227,#8b6914)",
  "Museum":"linear-gradient(135deg,#6b7fb0,#3a4f80)",
  "Ruin":"linear-gradient(135deg,#b08968,#6f4e37)",
  "Restaurant":"linear-gradient(135deg,#d98a5a,#a85a32)",
  "Bar":"linear-gradient(135deg,#5a7ab0,#2d4e7a)",
  "Wine Bar":"linear-gradient(135deg,#9a4f7a,#6b2f55)",

  "Landmark":"linear-gradient(135deg,#7a9ab0,#3a5f80)",
  "Gelato":"linear-gradient(135deg,#e87a8a,#c04060)"
};
function gradFor(p){ return TYPE_GRADIENT[p.type] || "linear-gradient(135deg,#9ca3af,#4b5563)"; }
function placeMetaHtml(p){
  if(p.rating != null){
    return `<span><b>${p.rating.toFixed(1)}</b> <span class="star">★</span> (${(p.count||0).toLocaleString()})</span> · <span>${p.type}</span>`;
  }
  return p.type ? `<span>${p.type}</span>` : '';
}
const photoIcon = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>`;

let map, activeIdx = -1, markers = [], homeMarker = null, activeFilter = "all";
let homeBase = loadHomeBase();
let tempOrigin = loadTempOrigin();

function loadHomeBase(){
  try{
    const s = localStorage.getItem(HOME_KEY);
    if(s){
      const h = JSON.parse(s);
      if(h && typeof h.lat === "number" && typeof h.lng === "number" && h.name){
        if(h.placeIdx === 0) return {...DEFAULT_HOME, ...h, name:DEFAULT_HOME.name, lat:DEFAULT_HOME.lat, lng:DEFAULT_HOME.lng, address:DEFAULT_HOME.address, pid:DEFAULT_HOME.pid};
        return h;
      }
    }
  }catch(e){}
  localStorage.removeItem("rome_home_base");
  localStorage.removeItem("rome_home_base_v2");
  localStorage.removeItem("rome_home_base_v3");
  localStorage.removeItem("rome_home_base_v4");
  const home = {...DEFAULT_HOME};
  localStorage.setItem(HOME_KEY, JSON.stringify(home));
  return home;
}
function saveHomeBase(h){ homeBase = h; localStorage.setItem(HOME_KEY, JSON.stringify(h)); refreshHomeMarker(); }
function loadTempOrigin(){
  localStorage.removeItem(TEMP_ORIGIN_KEY);
  try{
    const s = sessionStorage.getItem(TEMP_ORIGIN_KEY);
    if(s) return JSON.parse(s);
  }catch(e){}
  return null;
}
function saveTempOrigin(o){
  tempOrigin = o;
  if(o) sessionStorage.setItem(TEMP_ORIGIN_KEY, JSON.stringify(o));
  else sessionStorage.removeItem(TEMP_ORIGIN_KEY);
}
function getDirectionsOrigin(){ return tempOrigin || homeBase; }
function placeFor(loc){
  if(loc.placeIdx != null && PLACES[loc.placeIdx]) return PLACES[loc.placeIdx];
  return loc;
}
function resolvePid(loc){
  const place = placeFor(loc);
  return place.pid || null;
}
function endpointLabel(loc){
  const place = placeFor(loc);
  const name = place.name;
  const address = place.address;
  const lat = place.lat;
  const lng = place.lng;
  if(name && address) return `${name}, ${address}`;
  if(address) return address;
  if(name) return `${name}, Rome, Italy`;
  if(lat != null && lng != null) return `${lat},${lng}`;
  return "";
}
function setDirectionsEndpoint(params, role, loc){
  const label = endpointLabel(loc);
  if(!label) return;
  params.set(role, label);
  const pid = resolvePid(loc);
  if(pid) params.set(`${role}_place_id`, pid);
}
function directionsUrl(p){
  const origin = getDirectionsOrigin();
  const params = new URLSearchParams({ api:"1", travelmode:"driving" });
  setDirectionsEndpoint(params, "destination", p);
  if(origin) setDirectionsEndpoint(params, "origin", origin);
  return `https://www.google.com/maps/dir/?${params.toString()}`;
}
function setTempFromPlace(idx){
  const p = PLACES[idx];
  saveTempOrigin({name:p.name, lat:p.lat, lng:p.lng, pid:p.pid, address:p.address, placeIdx:idx});
  if(activeIdx===idx) openDetail(idx);
}
function clearTempOrigin(){ saveTempOrigin(null); if(activeIdx>=0) openDetail(activeIdx); }
window.setTempFromPlace = setTempFromPlace;
window.clearTempOrigin = clearTempOrigin;

function waUrl(num){ return `https://wa.me/${num.replace(/\D/g,'')}`; }
function refreshHomeMarker(){
  markers.forEach((m, i)=> m.el.classList.toggle('home', isHomePlace(i)));
  if(!homeMarker) return;
  if(!homeBase.custom && homeBase.placeIdx != null){
    homeMarker.map = null;
    return;
  }
  homeMarker.map = map;
  homeMarker.position = {lat:homeBase.lat, lng:homeBase.lng};
}

function loadGoogleMaps(){
  if(!GOOGLE_MAPS_API_KEY || GOOGLE_MAPS_API_KEY === "PASTE_YOUR_KEY_HERE"){
    document.getElementById('keywarn').classList.add('show');
    buildList();
    return;
  }
  const s = document.createElement('script');
  s.src = `https://maps.googleapis.com/maps/api/js?key=${GOOGLE_MAPS_API_KEY}&v=weekly&libraries=marker,places&loading=async&callback=initMap`;
  s.async = true;
  s.onerror = ()=>{ document.getElementById('keywarn').classList.add('show'); buildList(); };
  document.head.appendChild(s);
}

async function initMap(){
  const { Map } = await google.maps.importLibrary("maps");
  const { AdvancedMarkerElement } = await google.maps.importLibrary("marker");

  map = new Map(document.getElementById('map'), {
    center:{lat:41.899, lng:12.476}, zoom:13,
    mapId:"DEMO_MAP_ID",
    mapTypeControl:false, streetViewControl:false, fullscreenControl:false,
    gestureHandling:"greedy"
  });

  PLACES.forEach((p, idx)=>{
    const el = document.createElement('div');
    el.className = 'num-chip' + (isHomePlace(idx) ? ' home' : '');
    el.textContent = (idx+1);
    const marker = new AdvancedMarkerElement({ map, position:{lat:p.lat, lng:p.lng}, content:el });
    marker.addListener('gmp-click', ()=> openDetail(idx));
    el.addEventListener('click', ()=> openDetail(idx));
    markers.push({marker, el});
  });

  const homeEl = document.createElement('div');
  homeEl.className = 'num-chip home';
  homeEl.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg>`;
  homeMarker = new AdvancedMarkerElement({ map, position:{lat:homeBase.lat, lng:homeBase.lng}, content:homeEl, zIndex:500 });
  refreshHomeMarker();

  buildList();
  loadAllPhotos();
  syncMapView();
}
window.initMap = initMap;

function refreshChips(){
  markers.forEach((m,i)=> m.el.classList.toggle('active', i===activeIdx));
}

function isHomePlace(idx){
  return !homeBase.custom && homeBase.placeIdx === idx;
}
function placeMatchesFilter(p){
  return activeFilter === "all" || p.category === activeFilter;
}
function filteredIndices(){
  return PLACES.map((_, i)=>i).filter(i=>placeMatchesFilter(PLACES[i]));
}
function updateMarkerVisibility(){
  markers.forEach((m, i)=>{
    const show = placeMatchesFilter(PLACES[i]);
    m.marker.map = show ? map : null;
  });
}

function buildList(){
  const listEl = document.getElementById('list');
  listEl.innerHTML = '';
  PLACES.forEach((p, idx)=>{
    if(!placeMatchesFilter(p)) return;
    const div = document.createElement('div');
    div.className = 'list-item' + (isHomePlace(idx) ? ' home' : '');
    div.dataset.idx = idx;
    const meta = placeMetaHtml(p);
    const thumbInner = (p.photos && p.photos.length)
      ? `<img src="${p.photos[0]}" alt="" loading="lazy" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;">`
      : photoIcon;
    div.innerHTML = `
      <div class="thumb" style="background:${gradFor(p)}">${thumbInner}</div>
      <div class="li-body">
        <div class="li-title">
          <span class="li-num">${idx+1}</span>
          <h3>${p.name}</h3>
        </div>
        ${meta ? `<div class="li-meta">${meta}</div>` : ''}
        <div class="li-desc">${p.notes||''}</div>
      </div>`;
    div.addEventListener('click', ()=> openDetail(idx));
    listEl.appendChild(div);
  });
  updateMarkerVisibility();
}

function setThumb(idx){
  const p = PLACES[idx];
  const el = document.querySelector(`.list-item[data-idx="${idx}"] .thumb`);
  if(!el) return;
  if(p.photos && p.photos.length){
    el.innerHTML = `<img src="${p.photos[0]}" alt="" loading="lazy" onerror="this.style.display='none'" style="width:100%;height:100%;object-fit:cover;">`;
  }
}
function refreshListMeta(idx){
  const p = PLACES[idx];
  const el = document.querySelector(`.list-item[data-idx="${idx}"] .li-meta`);
  if(!el) return;
  const meta = placeMetaHtml(p);
  if(meta){
    el.innerHTML = meta;
    el.style.display = '';
  }
}

async function fetchPlaceDetails(p){
  if(!p.pid) return;
  try{
    const r = await fetch(`https://places.googleapis.com/v1/places/${p.pid}?fields=photos,formattedAddress,internationalPhoneNumber,rating,userRatingCount&key=${GOOGLE_MAPS_API_KEY}`);
    if(!r.ok) return;
    const data = await r.json();
    if(data.formattedAddress) p.address = data.formattedAddress;
    if(data.internationalPhoneNumber && !p.phone) p.phone = data.internationalPhoneNumber;
    if(data.rating != null) p.rating = data.rating;
    if(data.userRatingCount != null) p.count = data.userRatingCount;
    if(data.photos && data.photos.length){
      p.photos = data.photos.slice(0,3).map(ph =>
        `https://places.googleapis.com/v1/${ph.name}/media?maxWidthPx=900&key=${GOOGLE_MAPS_API_KEY}`);
    }
  }catch(e){}
}

async function loadAllPhotos(){
  for(const [idx,p] of PLACES.entries()){
    await fetchPlaceDetails(p);
    if(p.photos) setThumb(idx);
    refreshListMeta(idx);
    if(idx===activeIdx) openDetail(idx);
  }
}

const detail = document.getElementById('detail');
let photoIdx = 0;

function renderPhoto(p){
  const imgEl = document.getElementById('detailImg');
  const dotsEl = document.getElementById('detailDots');
  imgEl.style.display='block';
  imgEl.onerror = ()=> imgEl.style.display='none';
  imgEl.onload = ()=> imgEl.style.display='block';
  imgEl.src = p.photos[photoIdx];
  dotsEl.innerHTML = p.photos.length>1
    ? p.photos.map((_,i)=>`<span class="${i===photoIdx?'on':''}" onclick="photoGoto(${i})"></span>`).join('')
    : '';
}
function photoStep(dir){
  const p = PLACES[activeIdx];
  if(!p || !p.photos || p.photos.length<2) return;
  photoIdx = (photoIdx + dir + p.photos.length) % p.photos.length;
  renderPhoto(p);
}
function photoGoto(i){
  const p = PLACES[activeIdx];
  if(!p || !p.photos) return;
  photoIdx = i; renderPhoto(p);
}

function openDetail(idx){
  activeIdx = idx; refreshChips();
  const p = PLACES[idx];
  document.querySelectorAll('.list-item').forEach(el=>el.classList.toggle('active', +el.dataset.idx===idx));

  const photoEl = document.getElementById('detailPhoto');
  const imgEl = document.getElementById('detailImg');
  const dotsEl = document.getElementById('detailDots');
  photoEl.style.background = gradFor(p);
  if(p.photos && p.photos.length){
    photoIdx = 0;
    photoEl.classList.toggle('multi', p.photos.length>1);
    renderPhoto(p);
  } else {
    photoEl.classList.remove('multi');
    imgEl.style.display='none'; imgEl.removeAttribute('src'); dotsEl.innerHTML='';
  }

  const numEl = document.getElementById('dNum');
  numEl.textContent = idx+1;
  numEl.style.background = isHomePlace(idx) ? '#f5a623' : '';

  const subEl = document.getElementById('dSub');
  const subMeta = placeMetaHtml(p);
  if(subMeta){
    subEl.innerHTML = subMeta;
    subEl.style.display = 'flex';
  } else {
    subEl.innerHTML = '';
    subEl.style.display = 'none';
  }

  let html = `<a class="btn-primary" href="${directionsUrl(p)}" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 11 22 2 13 21 11 13 3 11"/></svg>
      Directions</a>`;
  const isTempHere = tempOrigin && tempOrigin.placeIdx === idx;
  if(!isTempHere){
    html += `<button type="button" class="btn-round" onclick="setTempFromPlace(${idx})" aria-label="Start next directions from here" title="Start next directions from here"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5A2.5 2.5 0 1 1 12 6a2.5 2.5 0 0 1 0 5.5z"/></svg></button>`;
  } else {
    html += `<button type="button" class="btn-round" onclick="clearTempOrigin()" aria-label="Clear temporary starting point" title="Clear temporary starting point"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>`;
  }
  if(p.phone) html += `<a class="btn-round" href="tel:${p.phone.replace(/\s/g,'')}" aria-label="Call"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg></a>`;
  if(p.website) html += `<a class="btn-round" href="${p.website}" target="_blank" rel="noopener" aria-label="Website"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></a>`;

  if(p.pid) fetchPlaceDetails(p).then(()=>{

    refreshListMeta(idx);

      document.getElementById('dSub').innerHTML = sub;
      document.getElementById('dSub').style.display = 'flex';
    }
    renderDetailExtra(p);
  });

  if(p.phone && !p.whatsapp) c += `<a href="tel:${p.phone.replace(/\s/g,'')}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${p.phone}</a>`;
  if(p.website){ const d=p.website.replace(/^https?:\/\//,'').replace(/\/$/,''); c += `<a href="${p.website}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>${d}</a>`; }

  const filtered = filteredIndices();
  const pos = filtered.indexOf(idx);
  document.getElementById('navCount').textContent = `${pos+1} of ${filtered.length}`;
  document.getElementById('navPrev').disabled = pos <= 0;
  document.getElementById('navNext').disabled = pos >= filtered.length - 1;

  detail.classList.add('show');
  scheduleMapViewSync();
}
function closeDetail(){
  detail.classList.remove('show'); activeIdx=-1; refreshChips();
  document.querySelectorAll('.list-item').forEach(el=>el.classList.remove('active'));
  scheduleMapViewSync();
}
function nav(dir){
  const filtered = filteredIndices();
  const pos = filtered.indexOf(activeIdx);
  if(pos < 0) return;
  const nextPos = pos + dir;
  if(nextPos < 0 || nextPos >= filtered.length) return;
  openDetail(filtered[nextPos]);
}

function sharePrototype(){
  const url = window.location.href;
  if(navigator.share){ navigator.share({title:"36 Hours in Rome – NYT Itinerary", url}).catch(()=>{}); }
  else if(navigator.clipboard){ navigator.clipboard.writeText(url).then(showToast).catch(showToast); }
  else showToast();
}
function showToast(){ const t=document.getElementById('toast'); t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2200); }

document.getElementById('filters').addEventListener('click', e=>{
  const chip = e.target.closest('.filter-chip');
  if(!chip) return;
  activeFilter = chip.dataset.cat;
  document.querySelectorAll('.filter-chip').forEach(c=>c.classList.toggle('on', c===chip));
  buildList();
  if(activeIdx>=0 && !placeMatchesFilter(PLACES[activeIdx])) closeDetail();
});

const panel = document.getElementById('panel');
const handle = document.getElementById('handle');
let dragStartY = null, dragMoved = false;
function isMobile(){ return window.matchMedia('(max-width:760px)').matches; }

function sheetBottomPx(){
  if(!isMobile()) return 0;
  if(detail.classList.contains('show')) return detail.offsetHeight || 0;
  return panel.offsetHeight || 0;
}
let mapSyncOverlay = null;
function getMapSyncOverlay(){
  if(!mapSyncOverlay){
    mapSyncOverlay = new google.maps.OverlayView();
    mapSyncOverlay.onAdd = function(){};
    mapSyncOverlay.draw = function(){};
  }
  return mapSyncOverlay;
}
function recenterActivePlace(){
  if(!map || activeIdx < 0) return;
  const p = PLACES[activeIdx];
  if(!p) return;
  const latLng = new google.maps.LatLng(p.lat, p.lng);
  const bottom = sheetBottomPx();
  map.panTo(latLng);
  if(!isMobile() || bottom <= 0) return;
  const ov = getMapSyncOverlay();
  ov.setMap(map);
  google.maps.event.addListenerOnce(map, 'idle', ()=>{
    const proj = ov.getProjection();
    if(!proj) return;
    const pt = proj.fromLatLngToContainerPixel(latLng);
    if(!pt) return;
    const div = map.getDiv();
    const dx = Math.round(pt.x - div.clientWidth / 2);
    const dy = Math.round(pt.y - (div.clientHeight - bottom) / 2);
    if(dx || dy) map.panBy(dx, dy);
  });
}
function syncMapView(){
  if(!map) return;
  map.setPadding({ top:0, right:0, bottom:sheetBottomPx(), left:0 });
  google.maps.event.trigger(map, 'resize');
  if(activeIdx >= 0) recenterActivePlace();
}
function scheduleMapViewSync(){
  syncMapView();
  requestAnimationFrame(syncMapView);
}

function setPanelCollapsed(collapsed){
  if(!isMobile()) return;
  panel.classList.toggle('collapsed', collapsed);
  scheduleMapViewSync();
}

handle.addEventListener('touchstart', e=>{
  if(!isMobile()) return;
  dragStartY = e.touches[0].clientY;
  dragMoved = false;
}, {passive:true});

handle.addEventListener('touchmove', e=>{
  if(dragStartY===null || !isMobile()) return;
  const dy = e.touches[0].clientY - dragStartY;
  if(Math.abs(dy) > 8) dragMoved = true;
  if(dy > 50) setPanelCollapsed(true);
  else if(dy < -50) setPanelCollapsed(false);
}, {passive:true});

handle.addEventListener('touchend', ()=>{
  if(dragStartY===null || !isMobile()) return;
  if(!dragMoved) setPanelCollapsed(panel.classList.contains('collapsed') ? false : true);
  dragStartY = null;
});

handle.addEventListener('mousedown', e=>{
  if(!isMobile()) return;
  dragStartY = e.clientY;
  dragMoved = false;
  e.preventDefault();
});
document.addEventListener('mousemove', e=>{
  if(dragStartY===null || !isMobile()) return;
  const dy = e.clientY - dragStartY;
  if(Math.abs(dy) > 8) dragMoved = true;
  if(dy > 50) setPanelCollapsed(true);
  else if(dy < -50) setPanelCollapsed(false);
});
document.addEventListener('mouseup', e=>{
  if(dragStartY===null || !isMobile()) return;
  if(!dragMoved) setPanelCollapsed(panel.classList.contains('collapsed') ? false : true);
  dragStartY = null;
});

if(isMobile()) panel.classList.add('collapsed');

panel.addEventListener('transitionend', e=>{
  if(e.propertyName === 'height') scheduleMapViewSync();
});
window.addEventListener('resize', scheduleMapViewSync);

// gallery: swipe + keyboard
(function(){
  const ph = document.getElementById('detailPhoto');
  let sx=null;
  ph.addEventListener('touchstart', e=>{ sx=e.touches[0].clientX; }, {passive:true});
  ph.addEventListener('touchend', e=>{
    if(sx===null) return;
    const dx = e.changedTouches[0].clientX - sx;
    if(dx<-40) photoStep(1); else if(dx>40) photoStep(-1);
    sx=null;
  });
  document.addEventListener('keydown', e=>{
    if(!detail.classList.contains('show')) return;
    if(e.key==='ArrowRight') photoStep(1);
    else if(e.key==='ArrowLeft') photoStep(-1);
    else if(e.key==='Escape') closeDetail();
  });
})();

// Load map immediately
loadGoogleMaps();

</script>
